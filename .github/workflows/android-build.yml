name: Build Android APK/AAB

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'capacitor.config.json'
      - 'package.json'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Capacitor & add platforms
        run: |
          npm ci
          npx cap add android
          npx cap sync android

      - name: Inject AdMob App ID & AD_ID permission
        run: |
          AD_ID="ca-app-pub-8608054862395616~1608999633"
          sed -i "s|<application|<uses-permission android:name=\"com.google.android.gms.permission.AD_ID\"/>\n    <application|" android/app/src/main/AndroidManifest.xml
          sed -i "s|<application|<application>\n        <meta-data android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"$AD_ID\"/>|" android/app/src/main/AndroidManifest.xml

      - name: Setup signing
        run: |
          echo "${{ secrets.LISTMATE_KEYSTORE }}" | base64 -d > android/app/listmate-upload.keystore
          python3 scripts/setup-signing.py android/app/build.gradle "${{ secrets.KEYSTORE_PASSWORD }}" "${{ secrets.KEY_ALIAS }}"
          # Bump version code in build.gradle — use GitHub run number
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionCode 2/versionCode ${{ github.run_number }}/" android/app/build.gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Build release AAB
        run: cd android && ./gradlew bundleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: listmate-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: listmate-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
