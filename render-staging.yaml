services:
  - type: web
    name: listmate-staging
    env: python
    branch: staging
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --timeout 30
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SSO_GOOGLE_CLIENT_ID
        value: 526061928190-8si99s2n17u7onf8mo2uapfjphtopnc1.apps.googleusercontent.com
      - key: SSO_GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SENDGRID_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
