<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#5ebe7e">
<title>Sign Up — Grocery List</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f4ed;min-height:100dvh;display:flex;align-items:center;justify-content:center}
  .card{background:#fff;border-radius:20px;padding:40px 32px;box-shadow:0 4px 24px rgba(0,0,0,0.08);max-width:380px;width:90%}
  .card h1{font-size:22px;margin-bottom:4px;color:#2c5a2c;text-align:center}
  .card h2{font-size:16px;margin-bottom:8px;color:#2c5a2c;text-align:center}
  .sub{font-size:14px;color:#888;margin-bottom:24px;text-align:center}
  .step{display:none}
  .step.active{display:block}
  label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:6px;margin-top:16px}
  input[type=text]{width:100%;padding:12px 14px;font-size:16px;border:1.5px solid #d8e0d0;border-radius:10px;background:#fff;outline:none}
  input[type=text]:focus{border-color:#5ebe7e}
  .btn{display:block;width:100%;padding:14px;margin-top:20px;background:#5ebe7e;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .error{color:#d94a4a;font-size:13px;margin-top:10px;display:none;text-align:center}
  .note{font-size:11px;color:#aaa;margin-top:20px;line-height:1.5;border-top:1px solid #eee;padding-top:16px;text-align:center}
  .invite-banner{background:#e8f5e9;border-radius:12px;padding:16px;margin-bottom:20px;text-align:center}
  .invite-banner .household{font-weight:700;color:#2c5a2c;font-size:16px;margin-bottom:4px}
  .invite-banner .desc{font-size:13px;color:#555}
  .back-link{text-align:center;margin-top:14px}
  .back-link a{font-size:13px;color:#5ebe7e;text-decoration:none}
  #gsiContainer{display:flex;justify-content:center;margin:16px 0}
</style>
</head>
<body>
<div class="card">
  <h1>🛒 Grocery List</h1>

  <!-- Invite banner (hidden by default) -->
  <div id="inviteBanner" class="invite-banner" style="display:none">
    <div class="household" id="inviteHousehold"></div>
    <div class="desc" id="inviteDesc"></div>
  </div>

  <p class="sub" id="pageSubtitle">Set up your household</p>

  <!-- Step 1: Sign in with Google -->
  <div id="step1" class="step active">
    <p style="text-align:center;font-size:14px;color:#666;margin-bottom:4px;">First, sign in with Google</p>
    <div id="gsiContainer"></div>
    <div id="loginError" class="error"></div>
  </div>

  <!-- Step 2: Choose household name -->
  <div id="step2" class="step">
    <label for="householdName">Household Name</label>
    <input type="text" id="householdName" placeholder="e.g. Raghav household" maxlength="60">
    <button class="btn" id="btnCreate" onclick="createHousehold()">Create Household</button>
    <div id="signupError" class="error"></div>
    <div class="back-link"><a href="#" onclick="resetSignup()">← Start over</a></div>
  </div>

  <div class="note">🔒 Your household's data is private and never shared.</div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const inviteToken = urlParams.get('token');
let googleCredential = null, googleEmail = null;

// Check if this is an invite link
(async function init() {
  if (inviteToken) {
    try {
      const r = await fetch('/api/auth/invite/' + inviteToken);
      const inv = await r.json();
      if (inv.valid) {
        document.getElementById('inviteBanner').style.display = 'block';
        document.getElementById('inviteHousehold').textContent = inv.household_name;
        document.getElementById('inviteDesc').textContent = inv.email 
          ? 'You\'ve been invited as ' + inv.email 
          : 'You\'ve been invited to join this household';
        document.getElementById('pageSubtitle').textContent = 'Sign in to accept your invitation';
      } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginError').textContent = inv.error || 'Invalid invite link';
        document.getElementById('pageSubtitle').textContent = '';
      }
    } catch(e) {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('loginError').textContent = 'Could not verify invite.';
    }
  }

  // Load Google Sign-In always
  try {
    const cfg = await (await fetch('/api/auth/config')).json();
    
    // Already logged in — accept invite if one is pending, else redirect home
    if (cfg.user) {
      if (inviteToken) {
        const acc = await fetch('/api/auth/invite/' + inviteToken + '/accept', { method: 'POST' });
        const accData = await acc.json();
        if (accData.ok) {
          // Redirect to home — they're now in the household
          window.location.href = '/';
          return;
        }
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginError').textContent = accData.error || 'Could not accept invite.';
        return;
      }
      window.location.href = '/';
      return;
    }
    const script = document.createElement('script');
    script.src = 'https://accounts.google.com/gsi/client';
    script.onload = () => {
      google.accounts.id.initialize({
        client_id: cfg.client_id,
        callback: onGoogleSignIn,
        auto_select: false,
      });
      google.accounts.id.renderButton(
        document.getElementById('gsiContainer'),
        { theme: 'outline', size: 'large', width: '280', text: 'signin_with' }
      );
    };
    document.head.appendChild(script);
  } catch(e) {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginError').textContent = 'Cannot reach server.';
  }
})();

async function onGoogleSignIn(response) {
  googleCredential = response.credential;

  // Decode JWT for email
  try {
    googleEmail = JSON.parse(atob(response.credential.split('.')[1])).email;
  } catch(e) {}

  // Step 1: Try login
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ credential: response.credential })
    });
    const data = await res.json();

    if (data.ok) {
      // Logged in — accept invite if one is pending
      if (inviteToken) {
        const acc = await fetch('/api/auth/invite/' + inviteToken + '/accept', { method: 'POST' });
        const accData = await acc.json();
        if (!accData.ok) {
          document.getElementById('loginError').style.display = 'block';
          document.getElementById('loginError').textContent = accData.error || 'Could not accept invite.';
          return;
        }
      }
      window.location.href = '/';
      return;
    }

    if (data.needs_signup) {
      // If there's an invite token, accept it directly (no household name needed)
      if (inviteToken) {
        const acc = await fetch('/api/auth/invite/' + inviteToken + '/accept', { method: 'POST' });
        const accData = await acc.json();
        if (accData.ok) {
          window.location.href = '/';
          return;
        }
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginError').textContent = accData.error || 'Could not accept invite.';
        return;
      }

      // No invite — show household name step
      document.getElementById('step1').classList.remove('active');
      document.getElementById('step2').classList.add('active');
      document.getElementById('householdName').focus();
      return;
    }

    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginError').textContent = data.error || 'Sign-in failed.';
  } catch(e) {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginError').textContent = 'Network error. Please try again.';
  }
}

async function createHousehold() {
  const name = document.getElementById('householdName').value.trim();
  if (!name) {
    document.getElementById('signupError').style.display = 'block';
    document.getElementById('signupError').textContent = 'Please enter a household name.';
    return;
  }
  document.getElementById('btnCreate').disabled = true;
  document.getElementById('signupError').style.display = 'none';

  try {
    const res = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ credential: googleCredential, household_name: name })
    });
    const data = await res.json();
    if (data.ok) window.location.href = '/';
    else {
      document.getElementById('signupError').style.display = 'block';
      document.getElementById('signupError').textContent = data.error || 'Could not create household.';
    }
  } catch(e) {
    document.getElementById('signupError').style.display = 'block';
    document.getElementById('signupError').textContent = 'Network error.';
  }
  document.getElementById('btnCreate').disabled = false;
}

function resetSignup() {
  googleCredential = null; googleEmail = null;
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step1').classList.add('active');
  document.getElementById('householdName').value = '';
  document.getElementById('signupError').style.display = 'none';
}
</script>
</body>
</html>
