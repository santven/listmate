<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#5ebe7e">
<title>Settings — Grocery List</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --green: #5ebe7e; --green-dark: #3a7a4a; --bg: #f0f4ed; --card: #fff; --text: #2c2c2c; --muted: #888; --border: #d8e0d0; --radius: 14px; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; }
  .header { background: linear-gradient(135deg, var(--green), var(--green-dark)); color: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
  .header h1 { font-size: 16px; font-weight: 700; flex: 1; }
  .header a { color: rgba(255,255,255,0.8); font-size: 13px; text-decoration: none; }
  .container { max-width: 500px; margin: 0 auto; padding: 16px; }
  .card { background: var(--card); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .card h2 { font-size: 15px; margin-bottom: 14px; color: #2c5a2c; }
  .card p { font-size: 13px; color: var(--muted); margin-bottom: 10px; }

  .member-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .member-row:last-child { border-bottom: 0; }
  .member-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--green); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
  .member-info { flex: 1; min-width: 0; }
  .member-name { font-size: 14px; font-weight: 600; }
  .member-email { font-size: 12px; color: var(--muted); }
  .member-role { font-size: 11px; color: var(--muted); background: #f0f4ed; padding: 2px 8px; border-radius: 6px; }

  .add-member { display: flex; gap: 8px; margin-top: 12px; }
  .add-member input { flex: 1; padding: 10px 12px; font-size: 14px; border: 1.5px solid var(--border); border-radius: 8px; outline: none; }
  .add-member input:focus { border-color: var(--green); }
  .add-member button { background: var(--green); color: #fff; border: none; border-radius: 8px; padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .add-member button:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-logout { display: block; width: 100%; padding: 12px; background: #fff; border: 1.5px solid #d94a4a; color: #d94a4a; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
  .btn-back { display: block; padding: 12px; text-align: center; color: var(--green); font-size: 14px; text-decoration: none; }

  .error { color: #d94a4a; font-size: 12px; margin-top: 6px; display: none; }
  .success { color: #3a7a4a; font-size: 12px; margin-top: 6px; display: none; }
  .you-badge { font-size: 10px; color: var(--green); font-weight: 600; margin-left: 4px; }
</style>
</head>
<body>
<div class="header">
  <h1>⚙️ Settings</h1>
  <a href="/">← Back to list</a>
</div>
<div class="container" id="app">
  <div class="card">
    <h2 id="householdTitle">Household</h2>
    <p id="householdDesc"></p>
  </div>

  <div class="card">
    <h2>Members</h2>
    <div id="memberList">Loading...</div>
    <div id="addMemberSection" style="display:none;">
      <div class="add-member">
        <input type="email" id="newMemberEmail" placeholder="Email address">
        <button id="btnAdd" onclick="addMember()">Add</button>
      </div>
      <div class="error" id="addError"></div>
      <div class="success" id="addSuccess"></div>
    </div>
  </div>

  <div class="card">
    <h2>🥗 Dietary Restrictions</h2>
    <p>Household-level preferences for meal planning and grocery suggestions.</p>
    <div id="dietaryCheckboxes" style="display:flex;flex-wrap:wrap;gap:12px;margin-top:8px;">
      <label style="display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer;background:#f7faf5;padding:8px 14px;border-radius:8px;border:1.5px solid var(--border);">
        <input type="checkbox" value="Vegetarian" onchange="saveDietary()"> 🥬 Vegetarian
      </label>
      <label style="display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer;background:#f7faf5;padding:8px 14px;border-radius:8px;border:1.5px solid var(--border);">
        <input type="checkbox" value="Vegan" onchange="saveDietary()"> 🌱 Vegan
      </label>
      <label style="display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer;background:#f7faf5;padding:8px 14px;border-radius:8px;border:1.5px solid var(--border);">
        <input type="checkbox" value="Gluten-Free" onchange="saveDietary()"> 🌾 Gluten-Free
      </label>
      <label style="display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer;background:#f7faf5;padding:8px 14px;border-radius:8px;border:1.5px solid var(--border);">
        <input type="checkbox" value="Halal" onchange="saveDietary()"> 🍖 Halal
      </label>
    </div>
    <div class="success" id="dietarySuccess" style="margin-top:8px;"></div>
    <h2 style="margin-top:24px">📍 Your Location</h2>
    <p class="note">Helps auto-populate store items for your area (Premium feature).</p>
    <div class="form-row" style="margin-top:12px">
      <div class="form-group">
        <label for="locZip">ZIP / Postal Code</label>
        <input type="text" id="locZip" placeholder="e.g. 60601" onchange="saveLocation()">
      </div>
      <div class="form-group">
        <label for="locCountry">Country</label>
        <input type="text" id="locCountry" placeholder="e.g. USA" onchange="saveLocation()">
      </div>
    </div>
    <div class="success" id="locSuccess" style="margin-top:4px;margin-bottom:4px;"></div>

  </div>

  <button class="btn-logout" onclick="logout()">Sign Out</button>
  <a class="btn-back" href="/">← Back to list</a>
</div>

<script>
let householdData = null;

(async function init() {
  // Check auth
  const cfg = await (await fetch('/api/auth/config')).json();
  if (!cfg.user) { window.location.href = '/login'; return; }

  // Load household data
  await loadHousehold();
  // Load dietary preferences
  await loadDietary();
    loadLocation();
})();

async function loadHousehold() {
  try {
    const res = await fetch('/api/auth/household');
    householdData = await res.json();
    const hh = householdData.household;
    const members = householdData.members;

    document.getElementById('householdDesc').textContent =
      hh ? `${hh.name} · ${members.length} member${members.length !== 1 ? 's' : ''}` : 'Loading...';

    // Render members
    const list = document.getElementById('memberList');
    list.innerHTML = members.map(m => `
      <div class="member-row">
        <div class="member-avatar">${(m.display_name || m.user_id)[0].toUpperCase()}</div>
        <div class="member-info">
          <div class="member-name">${m.display_name}${m.user_id === householdData.current_user_id ? '<span class="you-badge">you</span>' : ''}</div>
          <div class="member-email">${m.email}</div>
        </div>
        <div class="member-role">${m.role}</div>
      </div>
    `).join('');

    // Render pending invites
    const pending = householdData.pending_invites || [];
    if (pending.length > 0) {
      list.innerHTML += '<div style="margin-top:12px;padding-top:12px;border-top:1px dashed #d8e0d0"><div style="font-size:12px;color:#888;margin-bottom:8px;">🕐 Pending Invites</div></div>';
      pending.forEach(p => {
        list.innerHTML += `<div class="member-row" style="opacity:0.7">
          <div class="member-avatar" style="background:#ccc">?</div>
          <div class="member-info">
            <div class="member-name">${p.email}</div>
            <div class="member-email" style="font-size:10px">Invited ${p.created_at ? new Date(p.created_at).toLocaleDateString() : ''}</div>
          </div>
          <button onclick="removeInvite('${p.token}')" style="background:none;border:none;color:#d94a4a;cursor:pointer;font-size:18px;padding:4px 8px" title="Remove invite">×</button>
        </div>`;
      });
    }

    // Show add member form if owner
    if (householdData.is_owner) {
      document.getElementById('addMemberSection').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('memberList').textContent = 'Error loading household.';
  }
}

async function addMember() {
  const email = document.getElementById('newMemberEmail').value.trim();
  document.getElementById('addError').style.display = 'none';
  document.getElementById('addSuccess').style.display = 'none';

  if (!email) {
    document.getElementById('addError').style.display = 'block';
    document.getElementById('addError').textContent = 'Please enter an email address.';
    return;
  }

  document.getElementById('btnAdd').disabled = true;
  try {
    const res = await fetch('/api/auth/household/members', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    });
    const data = await res.json();
    if (data.ok) {
      const link = data.invite_link;
      document.getElementById('addSuccess').style.display = 'block';
      document.getElementById('addSuccess').innerHTML = 
        `<b>Invite link for ${email}:</b><br>
         <input type="text" value="${link}" readonly style="width:100%;font-size:11px;padding:4px;margin:4px 0;border:1px solid #ddd;border-radius:4px;" onclick="this.select()">
         <br><small>Copy this link and send it to ${email}</small>`;
      document.getElementById('newMemberEmail').value = '';
      await loadHousehold();
    } else {
      document.getElementById('addError').style.display = 'block';
      document.getElementById('addError').textContent = data.error || 'Could not add member.';
    }
  } catch(e) {
    document.getElementById('addError').style.display = 'block';
    document.getElementById('addError').textContent = 'Network error.';
  }
  document.getElementById('btnAdd').disabled = false;
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login';
}

async function removeInvite(token) {
  await fetch('/api/auth/household/invites/' + token, { method: 'DELETE' });
  loadHousehold();
}

async function loadDietary() {
  try {
    const r = await fetch('/api/settings/dietary');
    const d = await r.json();
    const vals = (d.dietary_restrictions || '').split(',').filter(Boolean);
    document.querySelectorAll('#dietaryCheckboxes input').forEach(cb => {
      cb.checked = vals.includes(cb.value);
    });
  } catch(e) {}
}

async function saveDietary() {
  const checked = [];
  document.querySelectorAll('#dietaryCheckboxes input:checked').forEach(cb => checked.push(cb.value));
  try {
    const r = await fetch('/api/settings/dietary', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({dietary_restrictions: checked.join(',')})
    });
    if (r.ok) {
      document.getElementById('dietarySuccess').textContent = '✓ Saved';
      setTimeout(() => document.getElementById('dietarySuccess').textContent = '', 2000);
    }
  } catch(e) {}
}

// ---- Location Settings ----
async function loadLocation() {
  try {
    const r = await fetch('/api/settings/location');
    const d = await r.json();
    document.getElementById('locZip').value = d.zip_code || '';
    document.getElementById('locCountry').value = d.country || '';
  } catch(e) {}
}

async function saveLocation() {
  const zip_code = document.getElementById('locZip').value.trim();
  const country = document.getElementById('locCountry').value.trim();
  try {
    const r = await fetch('/api/settings/location', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({zip_code, country})
    });
    if (r.ok) {
      document.getElementById('locSuccess').textContent = '✓ Saved';
      setTimeout(() => document.getElementById('locSuccess').textContent = '', 2000);
    }
  } catch(e) {}
}
</script>
</body>
</html>
