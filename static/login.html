<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#5ebe7e">
<title>Listmate</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, Roboto, sans-serif; background: #f0f4ed; min-height: 100dvh; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; border-radius: 20px; padding: 40px 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; max-width: 380px; width: 90%; }
  #subtitle { font-size: 14px; color: #888; margin-bottom: 28px; }
  .step { display: none; } .step.active { display: block; }
  .step h2 { font-size: 16px; margin-bottom: 8px; color: #2c5a2c; }
  label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; margin-top: 16px; text-align: left; }
  input[type=text] { width: 100%; padding: 12px 14px; font-size: 16px; border: 1.5px solid #d8e0d0; border-radius: 10px; outline: none; }
  input[type=text]:focus { border-color: #5ebe7e; }
  .btn { display: block; width: 100%; padding: 14px; margin-top: 20px; background: #5ebe7e; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
  .btn:disabled { opacity: 0.5; }
  .error { color: #d94a4a; font-size: 13px; margin-top: 10px; display: none; }
  .back-link { text-align: center; margin-top: 14px; } .back-link a { font-size: 13px; color: #5ebe7e; text-decoration: none; }
  .invite-banner { background: #e8f5e9; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
  .invite-banner .household { font-weight: 700; color: #2c5a2c; font-size: 16px; margin-bottom: 4px; }
  .invite-banner .desc { font-size: 13px; color: #555; }
  .privacy-note { font-size: 12px; color: #aaa; margin-top: 20px; line-height: 1.5; border-top: 1px solid #eee; padding-top: 16px; }
  .signin-btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px; width: 280px; padding: 10px 16px; border: 1px solid #dadce0; border-radius: 8px; background: #fff; text-decoration: none; font-size: 14px; font-weight: 500; color: #3c4043; box-shadow: 0 1px 2px rgba(0,0,0,0.08); cursor: pointer; }
</style>
</head>
<body>
<div class="card">
  <h1>🛒 Listmate</h1>
  <p id="subtitle">Store-smart grocery lists for your household</p>
  <div id="error" class="error"></div>
  <div id="step1" class="step active">
    <div style="margin-top:16px">
      <button onclick="doSignIn()" class="signin-btn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.95 16.46 0 20.12 0 24s.95 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
    </div>
  </div>
  <div id="step2" class="step">
    <div id="inviteBanner" class="invite-banner" style="display:none">
      <div class="household" id="inviteHousehold"></div>
      <div class="desc" id="inviteDesc"></div>
    </div>
    <div id="createSection">
      <h2>Set up your household</h2>
      <label for="householdName">Household Name</label>
      <input type="text" id="householdName" placeholder="e.g. Raghav household" maxlength="60">
      <button class="btn" id="btnCreate" onclick="createHousehold()">Create Household</button>
    </div>
    <button class="btn" id="btnAccept" onclick="acceptInvite()" style="display:none">Accept Invitation</button>
    <div class="error" id="step2Error"></div>
    <div class="back-link"><a href="#" onclick="goToStep1()">← Start over</a></div>
  </div>
  <div class="privacy-note">🔒 Only members of your household can see your list.</div>
</div>

<script>
var CLIENT_ID = '526061928190-8si99s2n17u7onf8mo2uapfjphtopnc1.apps.googleusercontent.com';
var inviteToken = (new URLSearchParams(window.location.search)).get('token') || sessionStorage.getItem('listmate_invite');
if (inviteToken) sessionStorage.removeItem('listmate_invite');
var googleCredential = null;

// Direct JavaScript navigation — Capacitor respects allowNavigation for user-initiated navigations
function doSignIn() {
  if (inviteToken) { sessionStorage.setItem('listmate_invite', inviteToken); }
  var nonce = Math.random().toString(36).slice(2);
  var url = 'https://accounts.google.com/o/oauth2/v2/auth?' +
    'client_id=' + CLIENT_ID +
    '&redirect_uri=' + encodeURIComponent(location.origin + '/login') +
    '&response_type=id_token' +
    '&scope=openid%20email%20profile' +
    '&nonce=' + nonce;
  window.location.assign(url);
}

// Check for session or redirect callback
(function() {
  try {
    fetch('/api/auth/config').then(function(r) {
      if (r.ok) r.json().then(function(c) { if (c.user) location.replace('/'); });
    });
  } catch(e) {}

  var hp = new URLSearchParams(window.location.hash.substring(1));
  var idToken = hp.get('id_token');
  if (idToken) {
    history.replaceState(null, '', location.pathname + location.search);
    handleCredential(idToken);
  }
})();

function handleCredential(credential) {
  googleCredential = credential;
  showError('');
  fetch('/api/auth/login', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({credential: credential})
  }).then(function(r) { return r.json().then(function(d) { return {ok: r.ok, data: d, status: r.status}; }); })
  .then(function(r) {
    if (r.data.ok) {
      if (inviteToken) {
        fetch('/api/auth/invite/'+inviteToken+'/accept',{method:'POST'}).then(function(){location.replace('/');});
      } else {
        location.replace('/');
      }
      return;
    }
    if (r.data.needs_signup) {
      document.getElementById('step1').classList.remove('active');
      document.getElementById('step2').classList.add('active');
      if (inviteToken) { showInviteBanner(); } else {
        document.getElementById('createSection').style.display='block';
        document.getElementById('btnAccept').style.display='none';
      }
      return;
    }
    showError(r.data.error||('Server error ('+r.status+')'));
  }).catch(function() { showError('Network error. Try again.'); });
}

function showInviteBanner() {
  fetch('/api/auth/invite/'+inviteToken).then(function(r){return r.json()}).then(function(d){
    if (d.valid) {
      document.getElementById('inviteBanner').style.display='block';
      document.getElementById('inviteHousehold').textContent=d.household_name;
      document.getElementById('inviteDesc').textContent=d.email?('Invited as '+d.email):'You have been invited';
      document.getElementById('createSection').style.display='none';
      document.getElementById('btnAccept').style.display='block';
      document.getElementById('subtitle').textContent='Accept your invitation';
    } else { showStep2Error(d.error||'Invalid invite'); }
  }).catch(function(){ showStep2Error('Could not verify invite.'); });
}

function acceptInvite() {
  var b=document.getElementById('btnAccept'); b.disabled=true; showStep2Error('');
  fetch('/api/auth/invite/'+inviteToken+'/accept',{method:'POST'}).then(function(r){return r.json()}).then(function(d){
    if(d.ok) location.replace('/'); else showStep2Error(d.error||'Failed');
  }).catch(function(){ showStep2Error('Network error.'); });
  b.disabled=false;
}

function createHousehold() {
  var n=document.getElementById('householdName').value.trim();
  if(!n){showStep2Error('Enter a household name');return;}
  var b=document.getElementById('btnCreate'); b.disabled=true; showStep2Error('');
  fetch('/api/auth/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({household_name:n})})
    .then(function(r){return r.json()}).then(function(d){
    if(d.ok) location.replace('/'); else showStep2Error(d.error||'Failed');
  }).catch(function(){ showStep2Error('Network error.'); });
  b.disabled=false;
}

function goToStep1() {
  googleCredential=null;
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step1').classList.add('active');
  document.getElementById('householdName').value='';
  document.getElementById('step2Error').style.display='none';
  document.getElementById('inviteBanner').style.display='none';
  document.getElementById('createSection').style.display='block';
  document.getElementById('btnAccept').style.display='none';
  document.getElementById('subtitle').textContent='Store-smart grocery lists for your household';
}

function showError(m){var e=document.getElementById('error');e.textContent=m;e.style.display=m?'block':'none';}
function showStep2Error(m){var e=document.getElementById('step2Error');e.textContent=m;e.style.display=m?'block':'none';}
</script>
</body>
</html>
