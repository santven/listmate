<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#5ebe7e">
<title>Listmate</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f4ed; min-height: 100dvh; display: flex;
    align-items: center; justify-content: center;
  }
  .card { background: #fff; border-radius: 20px; padding: 40px 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; max-width: 380px; width: 90%; }
  #subtitle { font-size: 14px; color: #888; margin-bottom: 28px; }
  #status { font-size: 14px; color: #888; margin: 12px 0; min-height: 24px; }
  #gsiContainer { display: flex; justify-content: center; margin-top: 16px; min-height: 44px; }
  .step { display: none; }
  .step.active { display: block; }
  .step h2 { font-size: 16px; margin-bottom: 8px; color: #2c5a2c; }
  label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; margin-top: 16px; text-align: left; }
  input[type=text] { width: 100%; padding: 12px 14px; font-size: 16px; border: 1.5px solid #d8e0d0; border-radius: 10px; outline: none; }
  input[type=text]:focus { border-color: #5ebe7e; }
  .btn { display: block; width: 100%; padding: 14px; margin-top: 20px; background: #5ebe7e; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { color: #d94a4a; font-size: 13px; margin-top: 10px; display: none; }
  .back-link { text-align: center; margin-top: 14px; }
  .back-link a { font-size: 13px; color: #5ebe7e; text-decoration: none; cursor: pointer; }
  .invite-banner { background: #e8f5e9; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
  .invite-banner .household { font-weight: 700; color: #2c5a2c; font-size: 16px; margin-bottom: 4px; }
  .invite-banner .desc { font-size: 13px; color: #555; }
  .privacy-note { font-size: 12px; color: #aaa; margin-top: 20px; line-height: 1.5; border-top: 1px solid #eee; padding-top: 16px; }
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div class="card">
  <h1>🛒 Listmate</h1>
  <p id="subtitle">Store-smart grocery lists for your household</p>
  <div id="error" class="error"></div>
  <div id="step1" class="step active">
    <div id="status"></div>
    <div id="gsiContainer"><span style="color:#888;font-size:13px">Loading sign-in button...</span></div>
  </div>
  <div id="step2" class="step">
    <div id="inviteBanner" class="invite-banner" style="display:none">
      <div class="household" id="inviteHousehold"></div>
      <div class="desc" id="inviteDesc"></div>
    </div>
    <div id="createSection">
      <h2>Set up your household</h2>
      <label for="householdName">Household Name</label>
      <input type="text" id="householdName" placeholder="e.g. Raghav household" maxlength="60">
      <button class="btn" id="btnCreate" onclick="createHousehold()">Create Household</button>
    </div>
    <button class="btn" id="btnAccept" onclick="acceptInvite()" style="display:none">Accept Invitation</button>
    <div class="error" id="step2Error"></div>
    <div class="back-link"><a href="#" onclick="goToStep1()">← Start over</a></div>
  </div>
  
  <div id="fallbackLink" style="display:none; margin-top: 12px;">
    <a href="/auth/google/redirect" style="display:inline-block;padding:12px 24px;border:1px solid #dadce0;border-radius:8px;background:#fff;text-decoration:none;color:#3c4043;font-weight:500">Sign in with Google</a>
  </div>
  <div class="privacy-note">🔒 Only members of your household can see your list.</div>
</div>

<script>
var CLIENT_ID = '526061928190-8si99s2n17u7onf8mo2uapfjphtopnc1.apps.googleusercontent.com';
var inviteToken = (new URLSearchParams(window.location.search)).get('token');
var googleCredential = null;

// ---- Google Sign-In via GSI popup (stays in WebView, no navigation) ----
function onGoogleLibraryLoad() {
  try {
    google.accounts.id.initialize({
      client_id: CLIENT_ID,
      callback: handleCredential,
      ux_mode: 'popup',
      use_fedcm_for_button: false
    });
    google.accounts.id.renderButton(
      document.getElementById('gsiContainer'),
      { theme: 'outline', size: 'large', text: 'signin_with', width: 280 }
    );
    document.getElementById('status').textContent = '';
  } catch(e) {
    document.getElementById('gsiContainer').innerHTML = '<p style="color:#d94a4a">Sign-in unavailable. Please try reinstalling the app.</p>';
    console.error('GSI init error:', e);
  }
}

// GSI loads async — wait for it
if (window.google && google.accounts) {
  onGoogleLibraryLoad();
} else {
  window.onload = function() {
    // Keep checking for GSI library
    var tries = 0;
    var check = setInterval(function() {
      if (tries === 15) {
        // Show fallback after 3 seconds if GSI hasn't loaded
        document.getElementById('fallbackLink').style.display = 'block';
        document.getElementById('gsiContainer').style.display = 'none';
      }
      tries++;
      if (window.google && google.accounts) {
        clearInterval(check);
        onGoogleLibraryLoad();
      } else if (tries > 30) {
        clearInterval(check);
        document.getElementById('gsiContainer').innerHTML = '<p style="color:#d94a4a">Could not load sign-in. Check your connection.</p>';
      }
    }, 200);
  };
}

function handleCredential(response) {
  googleCredential = response.credential;
  var s = document.getElementById('status');
  var e = document.getElementById('error');
  s.textContent = 'Signing in...'; e.style.display = 'none';
  
  fetch('/api/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({credential: response.credential})
  }).then(function(r) { return r.json().then(function(d) { return {ok: r.ok, data: d, status: r.status}; }); })
  .then(function(r) {
    if (r.data.ok) {
      if (inviteToken) { fetch('/api/auth/invite/'+inviteToken+'/accept',{method:'POST'}); }
      window.location.replace('/'); return;
    }
    if (r.data.needs_signup) {
      s.textContent = '';
      document.getElementById('step1').classList.remove('active');
      document.getElementById('step2').classList.add('active');
      if (inviteToken) { showInviteBanner(); } else {
        document.getElementById('createSection').style.display='block';
        document.getElementById('btnAccept').style.display='none';
      }
      return;
    }
    showError(r.data.error||('Server error ('+r.status+')'));
  }).catch(function() { showError('Network error. Refresh and try again.'); });
}

// Also handle id_token from redirect fallback
(function() {
  var hp = new URLSearchParams(window.location.hash.substring(1));
  var idToken = hp.get('id_token');
  if (idToken) {
    history.replaceState(null, '', location.pathname + location.search);
    handleCredential({credential: idToken});
  }
})();

// Background session check
try {
  fetch('/api/auth/config').then(function(r) {
    if (r.ok) r.json().then(function(c) { if (c.user) location.replace('/'); });
  });
} catch(e) {}

async function showInviteBanner() {
  try {
    var r = await fetch('/api/auth/invite/'+inviteToken); var d = await r.json();
    if (d.valid) {
      document.getElementById('inviteBanner').style.display='block';
      document.getElementById('inviteHousehold').textContent=d.household_name;
      document.getElementById('inviteDesc').textContent=d.email?('Invited as '+d.email):'You have been invited to join';
      document.getElementById('createSection').style.display='none';
      document.getElementById('btnAccept').style.display='block';
      document.getElementById('subtitle').textContent='Accept your invitation';
    } else { showStep2Error(d.error||'Invalid invite'); }
  } catch(e) { showStep2Error('Could not verify invite.'); }
}

async function acceptInvite() {
  var b=document.getElementById('btnAccept'); b.disabled=true;
  document.getElementById('step2Error').style.display='none';
  try { var r=await fetch('/api/auth/invite/'+inviteToken+'/accept',{method:'POST'}); var d=await r.json();
    if(d.ok) location.href='/'; else showStep2Error(d.error||'Failed');
  } catch(e) { showStep2Error('Network error.'); }
  b.disabled=false;
}

async function createHousehold() {
  var n=document.getElementById('householdName').value.trim();
  if(!n){showStep2Error('Enter a household name');return;}
  var b=document.getElementById('btnCreate'); b.disabled=true;
  document.getElementById('step2Error').style.display='none';
  try { var r=await fetch('/api/auth/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({household_name:n})}); var d=await r.json();
    if(d.ok) location.href='/'; else showStep2Error(d.error||'Failed');
  } catch(e) { showStep2Error('Network error.'); }
  b.disabled=false;
}

function goToStep1() {
  googleCredential=null;
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step1').classList.add('active');
  document.getElementById('householdName').value='';
  document.getElementById('step2Error').style.display='none';
  document.getElementById('inviteBanner').style.display='none';
  document.getElementById('createSection').style.display='block';
  document.getElementById('btnAccept').style.display='none';
  document.getElementById('subtitle').textContent='Store-smart grocery lists for your household';
}

function showError(m){var e=document.getElementById('error');e.textContent=m;e.style.display='block';}
function showStep2Error(m){var e=document.getElementById('step2Error');e.textContent=m;e.style.display='block';}
</script>
</body>
</html>
