<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#5ebe7e">
<title>Listmate</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f4ed; min-height: 100dvh; display: flex;
    align-items: center; justify-content: center;
  }
  .login-card {
    background: #fff; border-radius: 20px; padding: 40px 32px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center;
    max-width: 380px; width: 90%;
  }
  .login-card h1 { font-size: 22px; margin-bottom: 6px; color: #2c5a2c; }
  .login-card p { font-size: 14px; color: #888; margin-bottom: 28px; }
  #status { font-size: 14px; color: #888; margin: 12px 0; min-height: 24px; }
  #gsiContainer { display: flex; justify-content: center; margin-top: 16px; }
  .privacy-note { font-size: 12px; color: #aaa; margin-top: 20px; line-height: 1.5; border-top: 1px solid #eee; padding-top: 16px; }
</style>
</head>
<body>
<div class="login-card">
  <h1>🛒 Listmate</h1>
  <p>Store-smart grocery lists for your household</p>
  <div id="status">Connecting to server...</div>
  <div id="gsiContainer"></div>
  <div class="privacy-note">🔒 Only members of your household can see your list.</div>
</div>

<script>
let clientId = null;

async function init() {
  const status = document.getElementById('status');
  
  // Warm up the server first — Render free tier sleeps after 15min
  for (let i = 0; i < 8; i++) {
    try {
      const res = await fetch('/api/auth/config');
      if (res.ok) {
        const cfg = await res.json();
        if (cfg.user) { window.location.href = '/'; return; }
        clientId = cfg.client_id;
        break;
      }
    } catch(e) {}
    status.textContent = `Warming up server... (${i+1}/8)`;
    await new Promise(r => setTimeout(r, 5000));
  }
  
  if (!clientId) {
    status.textContent = 'Server unavailable. Please refresh.';
    return;
  }
  
  status.textContent = '';
  
  // Load Google Sign-In
  const script = document.createElement('script');
  script.src = 'https://accounts.google.com/gsi/client';
  script.onload = () => {
    google.accounts.id.initialize({
      client_id: clientId,
      callback: onSignIn,
      auto_select: false,
    });
    google.accounts.id.renderButton(
      document.getElementById('gsiContainer'),
      { theme: 'outline', size: 'large', width: '280', text: 'signin_with' }
    );
  };
  document.head.appendChild(script);
}

async function onSignIn(response) {
  document.getElementById('status').textContent = 'Signing in...';
  
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ credential: response.credential })
    });
    
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      document.getElementById('status').textContent = data.error || 'Login error.';
      return;
    }
    
    const data = await res.json();
    if (data.ok) { window.location.href = '/'; return; }
    if (data.needs_signup) { window.location.href = '/signup'; return; }
    document.getElementById('status').textContent = data.error || 'Login failed.';
  } catch(e) {
    document.getElementById('status').textContent = 'Lost connection. Please refresh.';
  }
}

init();
</script>
</body>
</html>
